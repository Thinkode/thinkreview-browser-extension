# Required: set in repo Settings → Secrets and variables → Actions:
# - Variable: GA_MEASUREMENT_ID (GA4 Measurement ID)
# - Secret: GA_API_SECRET (Measurement Protocol API Secret)
# - Secret: HONEYBADGER_API_KEY (Honeybadger API key)
name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Only run for the newest version tag
        id: tag_gate
        run: |
          git fetch --tags --force
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
          echo "Newest v* tag: $LATEST"
          echo "Event tag: ${GITHUB_REF_NAME}"
          if [[ "$LATEST" != "${GITHUB_REF_NAME}" ]]; then
            echo "This push is not the latest tag; skipping release build."
            echo "push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "push=true" >> "$GITHUB_OUTPUT"

      - name: Verify tag points to main
        if: steps.tag_gate.outputs.push == 'true'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "The tagged commit is not on the main branch."
            exit 1
          fi

      - name: Set up Node.js
        if: steps.tag_gate.outputs.push == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.tag_gate.outputs.push == 'true'
        run: npm ci

      - name: Update manifest version
        if: steps.tag_gate.outputs.push == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '${VERSION}';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
            console.log('Updated manifest version to ${VERSION}');
          "

      - name: Build extension
        if: steps.tag_gate.outputs.push == 'true'
        run: npm run build
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
          HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}

      - name: Build Firefox extension zip
        if: steps.tag_gate.outputs.push == 'true'
        id: firefox_zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm run build:firefox:zip
          echo "path=thinkreview-firefox-v${VERSION}.zip" >> "$GITHUB_OUTPUT"
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
          HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}

      - name: Archive extension
        if: steps.tag_gate.outputs.push == 'true'
        id: archive
        run: |
          ZIP_NAME="thinkreview-extension-${GITHUB_REF_NAME}.zip"
          cd build
          zip -r "../${ZIP_NAME}" .
          cd ..
          echo "zip_path=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.tag_gate.outputs.push == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ThinkReview Extension ${{ github.ref_name }}
          files: |
            ${{ steps.archive.outputs.zip_path }}
            ${{ steps.firefox_zip.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

