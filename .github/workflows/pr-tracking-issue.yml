# When a pull request is opened, opens a tracking GitHub issue (assigned to mshenawy22)
# and links it from the PR. Skips PRs that only touch release notes / manifest version style files.
name: PR tracking issue

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  create-tracking-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List changed files and decide skip
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate -q '.[].filename' > /tmp/pr_files.txt
          if node scripts/is-pr-release-only.mjs < /tmp/pr_files.txt; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: PR only changes release notes / manifest / version metadata."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue and link PR
        if: steps.classify.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNum = pr.number;
            const prUrl = pr.html_url;
            const prTitle = pr.title || '(no title)';
            const prBody = pr.body && pr.body.trim() ? pr.body : '_No description provided in the pull request._';

            const allFiles = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: prNum,
                per_page: 100,
                page,
              });
              if (!data.length) break;
              for (const f of data) allFiles.push(f.filename);
              if (data.length < 100) break;
            }

            const fileList = allFiles.map((f) => `- \`${f}\``).join('\n') || '- _(none listed)_';

            const issueTitle = `[PR #${prNum}] ${prTitle}`;
            const issueBody = [
              '## Tracked pull request',
              '',
              `This issue tracks **${prUrl}** (also: #${prNum}).`,
              '',
              '## Summary',
              '',
              prBody,
              '',
              '## Files changed',
              '',
              fileList,
              '',
              '---',
              '',
              `_Opened automatically when PR #${prNum} was created._`,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body: issueBody,
              assignees: ['mshenawy22'],
            });

            const issueNum = issue.number;
            const issueUrl = issue.html_url;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNum,
              body: `Tracking issue: ${issueUrl}`,
            });

            core.summary.addHeading('Tracking issue created');
            core.summary.addLink(`Issue #${issueNum}`, issueUrl);
